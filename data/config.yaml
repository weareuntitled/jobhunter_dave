search:
  sites:
    - linkedin
    - indeed
    - stepstone
  keywords:
    # --- UX, UI & Product Design ---
    - "UX Designer"
    - "UI Designer"
    - "UX/UI Designer"
    - "Product Designer"
    - "Digital Product Designer"
    - "Senior UX Designer"
    - "Senior Product Designer"
    - "Interaction Designer"
    - "Experience Designer"
    - "Visual Designer"
    - "UX Architect"
    - "Service Designer"
    - "UX Researcher"
    - "Design Systems"

    # --- Motion, Media & Content ---
    - "Motion Designer"
    - "Motion Graphics Designer"
    - "Multimedia Designer"
    - "Digital Creator"

    # --- Agile, Product & Transformation ---
    - "Product Owner"
    - "Scrum Master"
    - "Agile Coach"
    - "Product Manager"
    - "Digital Product Manager"
    - "Technical Product Owner"
    - "Digital Transformation Manager"
    - "Innovation Manager"
    - "Agile Project Manager"
    - "Delivery Lead"

    # --- AI, LLM & Automation ---
    - "Artificial Intelligence"
    - "Machine Learning"
    - "LLM"
    - "Prompt Engineer"
    - "AI Engineer"
    - "KI Engineer"
    - "AI Developer"
    - "AI Product"
    - "KI-Assistent"
    - "AI Automation Specialist"
    - "Workflow Automation"
    - "Process Automation Engineer"
    - "Business Automation"
    - "Low-Code"
    - "No-Code"
    - "AI Consultant"
    - "KI Berater"
    - "Creative Technologist"
    - "Conversational AI Designer"
    - "Generative AI"
  location: "Germany"
  results_per_site: 15
  exclude_portal_only: false

  stepstone:
    cooldown_hours: 6
    target_results: 15
    max_pages: 5
    radius: 50

